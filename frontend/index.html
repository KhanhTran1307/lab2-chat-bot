<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenMind AI</title>
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #050805;
      --bg2:       #0a100b;
      --bg3:       #0f1a10;
      --border:    #1a2e1c;
      --border2:   #243d26;
      --g1:        #0d4a1a;
      --g2:        #16a34a;
      --g3:        #22c55e;
      --g4:        #4ade80;
      --glow:      rgba(34,197,94,.18);
      --glow2:     rgba(34,197,94,.35);
      --red:       #ef4444;
      --txt:       #dcfce7;
      --txt2:      #86efac;
      --muted:     #3d6645;
      --dim:       #1e3d22;
      --font-mono: 'JetBrains Mono', monospace;
      --font-disp: 'Clash Display', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--txt); font-family: var(--font-mono); overflow: hidden; }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%; left: 50%; transform: translateX(-50%);
      width: 80vw; height: 60vh;
      background: radial-gradient(ellipse, rgba(22,163,74,.1) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: breathe 6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity:.6; transform:translateX(-50%) scaleY(1); }
      50%      { opacity:1;  transform:translateX(-50%) scaleY(1.15); }
    }

    #app { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; max-width:860px; margin:0 auto; }

    /* ── LOGIN ── */
    #login-screen {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100vh; animation: rise .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

    .login-box {
      width:420px; background:var(--bg2); border:1px solid var(--border2); border-radius:24px;
      padding:52px 48px 48px; text-align:center; position:relative;
      box-shadow: 0 0 0 1px var(--border), 0 32px 80px rgba(0,0,0,.7), 0 0 60px var(--glow);
    }
    .login-box::before {
      content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
      background:linear-gradient(90deg,transparent,var(--g3),transparent);
    }

    .login-orb {
      width:80px; height:80px; margin:0 auto 28px; border-radius:22px;
      background:linear-gradient(135deg,var(--g1),var(--bg3)); border:1px solid var(--g2);
      display:flex; align-items:center; justify-content:center; font-size:36px;
      box-shadow:0 0 40px var(--glow2); animation:orbPulse 3s ease-in-out infinite;
    }
    @keyframes orbPulse {
      0%,100%{box-shadow:0 0 40px var(--glow2)} 50%{box-shadow:0 0 64px rgba(34,197,94,.5)}
    }

    .login-name {
      font-family:var(--font-disp); font-size:32px; font-weight:700; letter-spacing:-1px;
      background:linear-gradient(135deg,#fff 30%,var(--g4));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px;
    }
    .login-sub { font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:40px; }

    .btn-signin {
      width:100%; padding:14px 20px; background:var(--g2); color:#000; border:none; border-radius:12px;
      font-family:var(--font-disp); font-size:15px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      transition:all .2s; box-shadow:0 4px 20px rgba(22,163,74,.4);
    }
    .btn-signin:hover { background:var(--g4); transform:translateY(-2px); box-shadow:0 8px 32px rgba(34,197,94,.5); }
    .btn-signin svg { width:20px; height:20px; flex-shrink:0; }

    /* ── CHAT ── */
    #chat-screen { display:none; flex-direction:column; height:100vh; animation:rise .4s cubic-bezier(.16,1,.3,1) both; }

    .topbar {
      flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
      padding:14px 24px; border-bottom:1px solid var(--border);
      background:rgba(10,16,11,.85); backdrop-filter:blur(16px);
    }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .top-icon {
      width:38px; height:38px; background:var(--g1); border:1px solid var(--border2);
      border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-size:17px; box-shadow:0 0 16px var(--glow);
    }
    .top-title { font-family:var(--font-disp); font-size:17px; font-weight:700; letter-spacing:-.3px; }
    .status-pill {
      display:flex; align-items:center; gap:5px; background:rgba(22,163,74,.1);
      border:1px solid var(--border2); border-radius:20px; padding:4px 10px;
      font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--g3);
    }
    .status-dot { width:6px; height:6px; background:var(--g3); border-radius:50%; animation:blink 1.8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .topbar-right { display:flex; align-items:center; gap:10px; }
    .user-pill {
      display:flex; align-items:center; gap:8px; background:var(--bg3);
      border:1px solid var(--border); border-radius:24px; padding:5px 12px 5px 5px;
    }
    .uavatar {
      width:28px; height:28px; border-radius:50%; background:var(--g1);
      border:1px solid var(--border2); display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700; color:var(--g4); overflow:hidden; flex-shrink:0;
    }
    .uavatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .uname { font-size:12px; font-weight:500; color:var(--txt2); max-width:110px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-out {
      background:transparent; border:1px solid var(--border); color:var(--muted);
      border-radius:8px; padding:6px 12px; font-size:11px; font-family:var(--font-mono);
      cursor:pointer; transition:all .2s; letter-spacing:.5px;
    }
    .btn-out:hover { border-color:var(--red); color:var(--red); background:rgba(239,68,68,.08); }

    /* messages */
    #messages {
      flex:1; overflow-y:auto; padding:28px 24px;
      display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth;
    }
    #messages::-webkit-scrollbar { width:3px; }
    #messages::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
    #messages { scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }

    .empty { margin:auto; display:flex; flex-direction:column; align-items:center; gap:14px; opacity:.4; }
    .empty-icon { font-size:44px; }
    .empty-txt { font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

    .row { display:flex; gap:10px; animation:popIn .28s cubic-bezier(.16,1,.3,1) both; }
    @keyframes popIn { from{opacity:0;transform:translateY(8px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
    .row.user { flex-direction:row-reverse; }

    .av { width:32px; height:32px; flex-shrink:0; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:13px; overflow:hidden; }
    .av.bot { background:var(--g1); border:1px solid var(--border2); color:var(--g3); }
    .av.usr { background:rgba(34,197,94,.12); border:1px solid var(--border2); color:var(--g4); font-weight:700; font-size:11px; }
    .av img { width:100%; height:100%; object-fit:cover; border-radius:8px; }

    .bubble-wrap { max-width:70%; display:flex; flex-direction:column; gap:4px; }
    .row.user .bubble-wrap { align-items:flex-end; }

    .bubble { padding:11px 15px; border-radius:14px; font-size:13px; line-height:1.7; word-break:break-word; }
    .row.bot .bubble { background:var(--bg3); border:1px solid var(--border); border-bottom-left-radius:3px; color:var(--txt); }
    .row.user .bubble { background:rgba(22,163,74,.15); border:1px solid var(--border2); border-bottom-right-radius:3px; color:var(--g4); }

    .ts { font-size:9px; letter-spacing:.5px; color:var(--dim); padding:0 3px; }

    .typing-wrap { display:flex; align-items:center; gap:5px; padding:12px 15px; }
    .dot { width:7px; height:7px; background:var(--g3); border-radius:50%; animation:bounce 1.1s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }

    /* input */
    .inputbar {
      flex-shrink:0; padding:16px 24px 20px; border-top:1px solid var(--border);
      background:rgba(10,16,11,.9); backdrop-filter:blur(16px);
    }
    .input-row {
      display:flex; align-items:center; gap:10px; background:var(--bg3);
      border:1px solid var(--border2); border-radius:14px; padding:6px 6px 6px 16px;
      transition:border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within { border-color:var(--g1); box-shadow:0 0 0 3px rgba(22,163,74,.12); }
    #user-input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--txt); font-family:var(--font-mono); font-size:13px; height:38px; line-height:38px;
    }
    #user-input::placeholder { color:var(--muted); }
    .send-btn {
      width:42px; height:42px; flex-shrink:0; background:var(--g2); border:none;
      border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .18s; box-shadow:0 2px 12px rgba(22,163,74,.3);
    }
    .send-btn:hover { background:var(--g4); transform:scale(1.06); box-shadow:0 4px 20px rgba(34,197,94,.45); }
    .send-btn:active { transform:scale(.94); }
    .send-btn svg { width:16px; height:16px; color:#000; }
    .hint { margin-top:8px; text-align:center; font-size:10px; color:var(--dim); letter-spacing:.5px; }
  </style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-orb"><img src="logo.jpg" alt="Bot Logo" style="width: 50px; height: 50px; object-fit: contain;"></div>
      <div class="login-name">GreenMind AI</div>
      <div class="login-sub">Powered by Gemini · Secured by Firebase</div>
      <button class="btn-signin" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Đăng nhập với Google
      </button>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen">
    <div class="topbar">
      <div class="topbar-left">
        <div class="top-icon"><img src="logo.jpg" alt="Bot Logo" style="width: 24px; height: 24px; object-fit: contain;"></div>
        <div class="top-title">GreenMind AI</div>
        <div class="status-pill"><div class="status-dot"></div>ONLINE</div>
      </div>
      <div class="topbar-right">
        <div class="user-pill">
          <div class="uavatar" id="hdr-av">?</div>
          <span class="uname" id="hdr-name">...</span>
        </div>
        <button class="btn-out" onclick="doLogout()">[ logout ]</button>
      </div>
    </div>

    <div id="messages">
      <div class="empty" id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-txt">Bắt đầu cuộc trò chuyện</div>
      </div>
    </div>

    <div class="inputbar">
      <div class="input-row">
        <input type="text" id="user-input" placeholder="Nhập câu hỏi...">
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="hint">Enter để gửi &nbsp;·&nbsp; Lịch sử được lưu tự động</div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyB3-0_Yziwkt-" + "vrx4hIjHwd97GzTM9rh0Q",
  authDomain:        "my-chatbot-8bf53.firebaseapp.com",
  projectId:         "my-chatbot-8bf53",
  storageBucket:     "my-chatbot-8bf53.firebasestorage.app",
  messagingSenderId: "91514304333",
  appId:             "1:91514304333:web:85f288ea128be394ee2904"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const API = "http://localhost:8000";
let me = null, busy = false;

onAuthStateChanged(auth, async user => {
  if (user) {
    me = user;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("chat-screen").style.display  = "flex";
    const av = document.getElementById("hdr-av");
    document.getElementById("hdr-name").textContent = user.displayName || user.email;
    if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}">`;
    else av.textContent = (user.displayName || "U")[0].toUpperCase();
    await loadHistory();
  } else {
    me = null;
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("chat-screen").style.display  = "none";
  }
});

window.loginGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert("Lỗi đăng nhập: " + e.message); }
};

window.doLogout = async () => {
  await signOut(auth);
  document.getElementById("messages").innerHTML =
    `<div class="empty" id="empty-state">
       <div class="empty-icon">💬</div>
       <div class="empty-txt">Bắt đầu cuộc trò chuyện</div>
     </div>`;
};

window.sendMsg = async () => {
  if (busy || !me) return;
  const inp = document.getElementById("user-input");
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = "";
  hideEmpty();
  addMsg("user", txt);
  const tid = showTyping();
  busy = true;
  try {
    const res  = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: txt, user_id: me.uid, user_email: me.email })
    });
    const data = await res.json();
    removeTyping(tid);
    addMsg("bot", data.answer || "Không có phản hồi.");
  } catch {
    removeTyping(tid);
    addMsg("bot", "❌ Không kết nối được backend.");
  } finally { busy = false; }
};

async function loadHistory() {
  try {
    const res  = await fetch(`${API}/messages/${me.uid}`);
    const data = await res.json();
    if (data.history?.length) {
      hideEmpty();
      data.history.forEach(h => { addMsg("user", h.message, false); addMsg("bot", h.answer, false); });
      scrollBot();
    }
  } catch { console.log("Không tải được lịch sử"); }
}

function hideEmpty() { document.getElementById("empty-state")?.remove(); }

function addMsg(type, text, animate = true) {
  const box = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = `row ${type}`;
  if (!animate) row.style.animation = "none";
  const avHTML = type === "bot"
    ? `<div class="av bot"><img src="logo.jpg" alt="Bot Logo" style="width: 100%; height: 100%; object-fit: cover;"></div>`
    : me?.photoURL
      ? `<div class="av usr"><img src="${me.photoURL}"></div>`
      : `<div class="av usr">${(me?.displayName||"U")[0].toUpperCase()}</div>`;
  row.innerHTML = `${avHTML}<div class="bubble-wrap"><div class="bubble">${esc(text)}</div><div class="ts">${now()}</div></div>`;
  box.appendChild(row);
  scrollBot();
}

function showTyping() {
  const box = document.getElementById("messages");
  const id  = "typ-" + Date.now();
  const row = document.createElement("div");
  row.id = id; row.className = "row bot";
  row.innerHTML = `<div class="av bot"><img src="logo.jpg" alt="Bot Logo" style="width: 100%; height: 100%; object-fit: cover;"></div><div class="bubble-wrap"><div class="bubble"><div class="typing-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  box.appendChild(row); scrollBot(); return id;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }
function scrollBot() { const b = document.getElementById("messages"); b.scrollTop = b.scrollHeight; }
function now() { return new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"}); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }

document.getElementById("user-input").addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.sendMsg(); }
});
</script>
</body>
</html>
